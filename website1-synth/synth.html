    <h1 class="title">BlazingFish</h1>
    <br>
    <div id="synthInput1">
        <!-- <div class="dropdown" style="float:right;"> -->
        <div class="dropdown">
            <button class="btn" id="wavetables1">Wavetables</button>
            <div class="dropdownContent">
                <button class="wavetablesButton" onClick="startSound(0, 0)">SINEWAVE</button>
                <button class="wavetablesButton" onClick="startSound(1, 0)">SQUAREWAVE</button>
                <button class="wavetablesButton" onClick="startSound(2, 0)">TRIANGLEWAVE</button>
                <button class="wavetablesButton" onClick="startSound(3, 0)">SAWTOOTHWAVE</button>
            </div>
        </div>
        <br>
        <div style="display:flex">
            <canvas id="waveGraph1"></canvas>
            <canvas id="pianoRoll1"></canvas>
        </div>
        <br>
        <button class="button" onClick="stopSound(0)">STOP</button>
        
        <div class="dropdown">
            <button class="btn" id="changeNotes1">Notes</button>
            <div class="dropdownContent">
                <button class="notesButton" onClick="changeNotes(0, 0)">C</button>
                <button class="notesButton" onClick="changeNotes(1, 0)">C#</button>
                <button class="notesButton" onClick="changeNotes(2, 0)">D</button>
                <button class="notesButton" onClick="changeNotes(3, 0)">D#</button>
                <button class="notesButton" onClick="changeNotes(4, 0)">E</button>
                <button class="notesButton" onClick="changeNotes(5, 0)">F</button>
                <button class="notesButton" onClick="changeNotes(6, 0)">F#</button>
                <button class="notesButton" onClick="changeNotes(7, 0)">G</button>
                <button class="notesButton" onClick="changeNotes(8, 0)">G#</button>
                <button class="notesButton" onClick="changeNotes(9, 0)">A</button>
                <button class="notesButton" onClick="changeNotes(10, 0)">A#</button>
                <button class="notesButton" onClick="changeNotes(11, 0)">B</button>
            </div>
        </div>   
        <input type="number" id="octave1" name="octave" min="0" max="10">     
        <div class="sliderContainer">
            Tuning
            <input
                type="range"
                min="0.5"
                max="1.5"
                step="0.05"
                value="1"
                class="slider"
                id="frequency1"
            >
        </div>
        <div class="sliderContainer">
            Detune
            <input
                type="range"
                min="0"
                max="1"
                step="0.01"
                value="0"
                class="slider"
                id="detune1"
            >
        </div>
        <div class="sliderContainer">
            Voices
            <input
                type="range"
                min="1"
                max="16"
                step="1"
                value="1"
                class="slider"
                id="voices1"
            >
        </div>
        <div class="sliderContainer">
            Volume
            <input
                type="range"
                min="0"
                max="1"
                step="0.01"
                value="0.15"
                class="slider"
                id="volume1"
            >
        </div>
    </div>
